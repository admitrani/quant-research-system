execution:
  mode: batch
  frequency: daily

storage:
  format: parquet
  partition_by: date

market_data:
  source: binance

  symbols:
    - BTCUSDT

  intervals:
    - 1h

  historical_start: "2019-01-01"

  ingestion:
    limit: 1000
    max_retries: 5
    backoff_seconds: 1.0

system:
  version: v1

  modeling:
    horizon: 3
    mode: long_flat
    threshold: 0.5

  validation:
    scheme: expanding
    initial_train_years: 3
    test_years: 1
    retrain_each_window: true

  costs:
    broker: ibkr
    commission_per_side: 0.0018
    slippage_per_side: 0.0005